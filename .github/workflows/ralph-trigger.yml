name: Ralph Trigger

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  ralph:
    if: contains(github.event.comment.body, '--ralph')
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number
        id: issue
        run: echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate ADW ID
        id: adw
        run: echo "id=ralph-trigger-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run Ralph workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run adws/workflows/adw_ralph.ts --adw-id "${{ steps.adw.outputs.id }}" --issue "${{ steps.issue.outputs.number }}"

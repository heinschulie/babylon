name: Document Trigger

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  document:
    if: contains(github.event.comment.body, '--document')
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number
        id: issue
        run: echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Find and checkout feature branch
        run: |
          BRANCH=$(git branch -r --list "origin/hein/feature/issue-${{ steps.issue.outputs.number }}-*" | head -1 | sed 's|origin/||' | xargs)
          if [ -z "$BRANCH" ]; then
            echo "No feature branch found for issue #${{ steps.issue.outputs.number }}"
            exit 1
          fi
          git checkout "$BRANCH"
          echo "Checked out branch: $BRANCH"

      - name: Install dependencies
        run: bun install

      - name: Generate ADW ID
        id: adw
        run: echo "id=doc-trigger-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run document trigger workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run adws/workflows/adw_document_ralph.ts --adw-id "${{ steps.adw.outputs.id }}" --issue "${{ steps.issue.outputs.number }}"
